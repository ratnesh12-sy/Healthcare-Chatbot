# ===================================================================
# TEST PROFILE — H2 In-Memory Database (PostgreSQL Compatibility Mode)
# ===================================================================
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let Hibernate create schema from entities (no Flyway in tests)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Disable Flyway for tests — H2 doesn't support all PostgreSQL-specific DDL
spring.flyway.enabled=false

# Minimal JWT config for tests
healthcare.jwt.secret=dGVzdHNlY3JldGtleWZvcmp1bml0dGVzdGluZzEyMzQ1Njc4OTAxMjM0NTY3ODk=
healthcare.jwt.expiration=86400000

# Cookie config
app.cookie.secure=false
app.cookie.domain=

# OpenAI/Groq — disabled for appointment tests
openai.api-url=http://localhost:9999/fake
openai.model=test-model
openai.api-key=test-key

# Booking config
booking.max-days=30
booking.min-notice-minutes=30

# CORS
app.cors.allowedOrigins=http://localhost:3000

# Supabase (mock/disabled for tests)
supabase.url=http://localhost:9999
supabase.secret-key=test-key
supabase.bucket=test-bucket

# Suppress noisy logs
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN
