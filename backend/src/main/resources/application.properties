spring.application.name=HealthCare AI Assistant
server.port=8081
logging.level.org.springframework.security=TRACE
logging.file.name=trace.log
# ===================================================================
# DATABASE CONFIGURATION (PostgreSQL + SSL for Neon)
# ===================================================================
# IMPORTANT: The DATABASE_URL must be in JDBC format:
# jdbc:postgresql://<host>:<port>/<dbname>?sslmode=require
# If you are using Render, add this as a secret environment variable.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-rough-silence-a1ktbcc5.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USER:neondb_owner}
spring.datasource.password=${DB_PASS:npg_eus6JrbvTS8a}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE (Production Strategy)
# ===================================================================
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# CRITICAL: Flyway is the ONLY source of truth for schema management.
# Hibernate will only validate the existing schema against entities.
spring.jpa.hibernate.ddl-auto=validate

# SQL Logging (Disabled in Production for Performance and Security)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# FLYWAY (Database Migrations)
# ===================================================================
spring.flyway.enabled=true
# Prevent Flyway from failing if it detects an existing schema
spring.flyway.baseline-on-migrate=true

# ===================================================================
# HIKARICP (Connection Pool Optimization)
# ===================================================================
# Advanced settings for stable cloud connections
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10

# JWT Configuration
healthcare.jwt.secret=${JWT_SECRET:YmFzZTY0c2VjcmV0a2V5Zm9yaGVhbHRoY2FyZWNoYXRib3RhcHAxMjM0NTY3ODkw}
healthcare.jwt.expiration=86400000

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Upload limitations
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
# OpenAI Configuration (Groq API setup)
openai.api-url=https://api.groq.com/openai/v1/chat/completions
openai.model=llama-3.3-70b-versatile
openai.api-key=${GROQ_API_KEY}
