spring.application.name=HealthCare AI Assistant
spring.main.lazy-initialization=true
server.port=${PORT:8081}
logging.level.org.springframework.security=INFO
logging.file.name=trace.log
server.error.include-stacktrace=never
# ===================================================================
# DATABASE CONFIGURATION (PostgreSQL + SSL for Neon)
# ===================================================================
# IMPORTANT: The DATABASE_URL must be in JDBC format:
# jdbc:postgresql://<host>:<port>/<dbname>?sslmode=require
# If you are using Render, add this as a secret environment variable.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://ep-rough-silence-a1ktbcc5-pooler.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USER:neondb_owner}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# JPA / HIBERNATE (Production Strategy)
# ===================================================================
# Dialect auto-detected by Hibernate — no explicit setting needed
spring.jpa.open-in-view=false

# CRITICAL: Flyway is the ONLY source of truth for schema management.
# Hibernate will only validate the existing schema against entities.
spring.jpa.hibernate.ddl-auto=validate

# SQL Logging (Disabled in Production for Performance and Security)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# TIMEZONE (UTC Lock — Global Scaling)
# ===================================================================
spring.jackson.time-zone=UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ===================================================================
# FLYWAY (Database Migrations)
# ===================================================================
spring.flyway.enabled=true
# Prevent Flyway from failing if it detects an existing schema
spring.flyway.baseline-on-migrate=true

# ===================================================================
# HIKARICP (Connection Pool Optimization)
# ===================================================================
# Advanced settings for stable Neon cloud connections
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5

# JWT Configuration
healthcare.jwt.secret=${JWT_SECRET:YmFzZTY0c2VjcmV0a2V5Zm9yaGVhbHRoY2FyZWNoYXRib3RhcHAxMjM0NTY3ODkw}
healthcare.jwt.expiration=86400000

# Google Sign-In — OAuth client ID (public). Used to verify Google ID tokens server-side.
# Leave empty to disable Google login (the frontend button hides itself).
google.client-id=${GOOGLE_CLIENT_ID:}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Upload limitations (5MB max for doctor verification documents)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
# OpenAI Configuration (Groq API setup)
openai.api-url=https://api.groq.com/openai/v1/chat/completions
openai.model=llama-3.3-70b-versatile
openai.api-key=${GROQ_API_KEY:MISSING_GROQ_API_KEY}

# ===================================================================
# BOOKING CONFIGURATION
# ===================================================================
booking.max-days=30
booking.min-notice-minutes=30

# ===================================================================
# WEB PUSH (VAPID) — closed-app browser notifications
# ===================================================================
# Generate a keypair once (e.g. `npx web-push generate-vapid-keys`) and set these
# as env vars in prod. If blank, push is simply disabled (in-app reminders still work).
# The shared secret guards the cron-triggered /dispatch endpoint.
app.push.vapid.public-key=${VAPID_PUBLIC_KEY:}
app.push.vapid.private-key=${VAPID_PRIVATE_KEY:}
app.push.vapid.subject=${VAPID_SUBJECT:mailto:noreply@healthcare-chatbot.app}
app.push.dispatch-secret=${DISPATCH_SECRET:}

# Quiet hours — no push sent during this window (server local time, HH:mm). Blank = always on.
app.push.quiet-start=${QUIET_START:22:00}
app.push.quiet-end=${QUIET_END:07:00}

# ===================================================================
# CORS & COOKIE CONFIGURATION (Cross-Origin Deployment)
# ===================================================================
# Comma-separated origins (used for both HTTP CORS and WebSocket CORS)
app.cors.allowedOrigins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://healthcare-chatbot-1.vercel.app}

# Cookie security — MUST be true for cross-origin deployment (Vercel → Render)
# When true: Secure=true, SameSite=None (required for cross-origin cookies)
# When false: Secure=false, SameSite=Lax (local development)
#
# ⚠️ PRODUCTION CHECKLIST:
#   1. Set COOKIE_SECURE=true        (required — without this, every authenticated POST returns 401)
#   2. Set ALLOWED_ORIGINS to your exact frontend URL (e.g. https://healthcare-chatbot-1.vercel.app)
#   3. COOKIE_DOMAIN can stay empty   (browser scopes cookie to backend domain automatically)
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.domain=${COOKIE_DOMAIN:}

# ===================================================================
# SUPABASE STORAGE (Doctor Verification Documents)
# ===================================================================
# Default to empty so the storage bean always constructs even when Supabase is
# not configured (e.g. local dev). Without this, a missing SUPABASE_URL/SECRET_KEY
# fails the SupabaseStorageService bean, which cascades and 500s the doctor dashboard
# (DoctorDashboardController -> DoctorVerificationService -> SupabaseStorageService).
# Only document upload/download actually requires these — and those fail with a clear
# error if unset. Production sets the real values, so it is unaffected.
supabase.url=${SUPABASE_URL:}
supabase.secret-key=${SUPABASE_SECRET_KEY:}
supabase.bucket=${SUPABASE_BUCKET:doctor-verifications}