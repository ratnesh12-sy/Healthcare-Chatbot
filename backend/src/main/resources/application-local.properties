# ===================================================================
# LOCAL DEV PROFILE — in-memory H2 (PostgreSQL compatibility mode)
# Activate with:  mvn -Plocal spring-boot:run -Dspring-boot.run.profiles=local,dev
# (the `dev` profile triggers DevDataSeeder, which seeds demo users/doctors)
#
# No Postgres/Docker required, and your real Neon DB is never touched.
# ===================================================================
spring.datasource.url=jdbc:h2:mem:healthcaredev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Generate the schema from JPA entities (Flyway migrations are Postgres-specific,
# so they are disabled here — the V13 reminders table is created from the entity).
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

# Seed the roles table before the CommandLineRunner seeders run.
# lazy-init must be off here, otherwise the SQL script initializer is deferred
# and DevDataSeeder runs before roles exist ("ROLE_ADMIN not found").
spring.main.lazy-initialization=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:db/local/roles-local.sql

# H2 web console at http://localhost:8081/h2-console (JDBC URL above, user sa)
spring.h2.console.enabled=true

# Uses your real Groq key if GROQ_API_KEY is set in the environment; otherwise a
# dummy value so the app still boots (AiHybridService validates the key eagerly).
# Get a free key at https://console.groq.com — then run with it set (see below).
openai.api-key=${GROQ_API_KEY:local-dev-dummy-key}

# Local cookies: Secure=false, SameSite=Lax (works for localhost:3000 -> :8081)
app.cookie.secure=false

# Throwaway VAPID keypair for LOCAL push testing only (prod sets real keys via env).
# Generated with `npx web-push generate-vapid-keys` — safe to be public; not used in prod.
app.push.vapid.public-key=BAk0CqF32fYWEHuTGElwPqMBJmAgbIuqHYuAHeGcOjsmyY-NLF1etuKLppfOigDJmccb1YHzwUtvGmXmc9N_zCg
app.push.vapid.private-key=pxVEfXOr7XsIaQZdNsiXVBP8g6_ovlxdcInpZkjr2oU
app.push.dispatch-secret=local-dispatch-secret
# Disable quiet hours locally so test pushes always fire.
app.push.quiet-start=
app.push.quiet-end=
